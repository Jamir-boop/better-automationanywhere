name: Publish Stores

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Check auth without uploading packages
        type: boolean
        default: true
      chrome_upload_only:
        description: Upload Chrome package without submitting for review
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-stores
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CHROME_EXTENSION_ID: ${{ vars.CHROME_EXTENSION_ID }}
      CHROME_PUBLISHER_ID: ${{ vars.CHROME_PUBLISHER_ID }}
      CHROME_PROJECT_ID: ${{ vars.CHROME_PROJECT_ID }}
      SERVICE_ACCOUNT_EMAIL: ${{ vars.SERVICE_ACCOUNT_EMAIL }}
      CHROME_UPLOAD_ONLY: ${{ inputs.chrome_upload_only }}
      FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
      FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
      FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
      FIREFOX_CHANNEL: listed
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check:maintenance

      - name: Authenticate to Google Cloud
        id: google-auth
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: false
          project_id: ${{ vars.CHROME_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Submit dry run
        if: ${{ inputs.dry_run }}
        env:
          CWS_ACCESS_TOKEN: ${{ steps.google-auth.outputs.access_token }}
        run: pnpm submit:dry-run

      - name: Submit to stores
        if: ${{ !inputs.dry_run }}
        env:
          CWS_ACCESS_TOKEN: ${{ steps.google-auth.outputs.access_token }}
        run: pnpm submit:stores
